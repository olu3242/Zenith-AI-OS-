version: '3.9'

# =============================================================================
# ZENITH AI OS — Docker Compose
# Local development stack: Next.js app, Postgres (pgvector), Redis, n8n
# Usage: docker-compose up -d
# =============================================================================

services:

  # ─── Postgres (pgvector for embeddings) ─────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: zenith-aios-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: zenith_aios
      POSTGRES_USER: zenith
      POSTGRES_PASSWORD: zenith_dev_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./supabase/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zenith -d zenith_aios"]
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: zenith_aios
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis (workflow queue, rate limiting, session cache) ─────────────────
  redis:
    image: redis:7-alpine
    container_name: zenith-aios-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Next.js Web App ─────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: zenith-aios-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://zenith:zenith_dev_secret@postgres:5432/zenith_aios
      REDIS_URL: redis://redis:6379
      NEXT_PUBLIC_SUPABASE_URL: http://localhost:8000
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-eyJ...}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AIOS_ENCRYPTION_KEY: ${AIOS_ENCRYPTION_KEY:-dev-key-32-bytes-long-change-me!!}
      AIOS_AUDIT_LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/web:/app/apps/web:delegated
      - ./packages:/app/packages:delegated
      - /app/node_modules
      - /app/apps/web/.next
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── n8n Workflow Automation ──────────────────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: zenith-aios-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: admin
      N8N_BASIC_AUTH_PASSWORD: zenith_n8n_dev
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://localhost:5678
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: zenith_aios
      DB_POSTGRESDB_USER: zenith
      DB_POSTGRESDB_PASSWORD: zenith_dev_secret
      DB_POSTGRESDB_SCHEMA: n8n
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - n8n_data:/home/node/.n8n

  # ─── Adminer (optional DB UI) ─────────────────────────────────────────────
  adminer:
    image: adminer:latest
    container_name: zenith-aios-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    profiles:
      - tools

  # ─── Redis Commander (optional Redis UI) ─────────────────────────────────
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: zenith-aios-redis-ui
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      REDIS_HOSTS: local:redis:6379
    depends_on:
      - redis
    profiles:
      - tools
  n8n:
    image: n8nio/n8n:latest
    ports:
      - '5678:5678'
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=password
      - WEBHOOK_URL=http://localhost:5678/
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
  redis_data:
  n8n_data:

networks:
  default:
    name: zenith-aios-network
